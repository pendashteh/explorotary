<style>
:root {
  --navy: #0f1c2e;
  --navy2: #162436;
  --navy3: #1e3248;
  --gold: #d4a843;
  --gold2: #f0c96a;
  --white: #f4f0e8;
  --muted: #7a8fa8;
  --border: rgba(255,255,255,0.07);
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--navy);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  overflow: hidden;
}

/* ── HEADER ── */
#header {
  background: var(--navy);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.gear {
  width: 24px; height: 24px;
  animation: spin 16s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.app-title {
  font-family: 'Cormorant', serif;
  font-weight: 500;
  font-size: 1.05rem;
  color: var(--gold);
  letter-spacing: 0.03em;
  flex: 1;
}

/* breadcrumb */
#breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 8px;
  min-height: 20px;
}

.bc {
  font-size: 0.7rem;
  color: var(--muted);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background .15s;
  white-space: nowrap;
}
.bc:hover, .bc:active { background: rgba(255,255,255,0.07); color: var(--gold); }
.bc.current { color: var(--gold2); font-weight: 500; }
.bc-sep { color: rgba(255,255,255,0.2); font-size: 0.65rem; }

/* ── MAIN SCROLL AREA ── */
#main {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px 14px 40px;
  -webkit-overflow-scrolling: touch;
}

/* ── SLIDE TRANSITION ── */
.slide-enter {
  animation: slideIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
.slide-back {
  animation: slideBack 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes slideIn {
  from { transform: translateX(32px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideBack {
  from { transform: translateX(-24px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}

/* ── FOCUS CARD (top of view) ── */
.focus-card {
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.focus-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
  pointer-events: none;
}

.focus-tag {
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 500;
  opacity: 0.8;
  margin-bottom: 6px;
  display: block;
}

.focus-title {
  font-family: 'Cormorant', serif;
  font-size: 1.5rem;
  font-weight: 500;
  line-height: 1.2;
  margin-bottom: 4px;
}

.focus-sub {
  font-size: 0.78rem;
  opacity: 0.65;
  line-height: 1.5;
  font-style: italic;
}

/* stat row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
  gap: 8px;
  margin-top: 14px;
}

.stat {
  background: rgba(0,0,0,0.25);
  border-radius: 8px;
  padding: 8px 6px;
  text-align: center;
}

.stat-n {
  font-family: 'Cormorant', serif;
  font-size: 1.2rem;
  font-weight: 500;
  line-height: 1;
}

.stat-l {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.6;
  margin-top: 3px;
}

/* detail rows */
.details {
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 12px;
}

.detail-row {
  display: flex;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  align-items: flex-start;
}

.detail-row:last-child { border-bottom: none; }

.d-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; width: 20px; }
.d-body {}
.d-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.5; margin-bottom: 1px; }
.d-val { font-size: 0.8rem; opacity: 0.85; line-height: 1.45; }
.d-val strong { color: var(--white); font-weight: 500; opacity: 1; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── CHILD CARDS ── */
.children-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.child-card {
  background: var(--navy2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .12s;
  -webkit-tap-highlight-color: transparent;
  active-scale: 0.98;
}

.child-card:active {
  background: var(--navy3);
  transform: scale(0.98);
}

.child-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.child-inner { flex: 1; min-width: 0; }

.child-name {
  font-size: 0.88rem;
  font-weight: 400;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.child-meta {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.child-arrow {
  font-size: 0.9rem;
  color: var(--muted);
  flex-shrink: 0;
}

.child-card.has-children .child-arrow { color: var(--gold); }

/* highlight focus club in children */
.child-card.is-focus {
  border-color: rgba(212,168,67,0.4);
  background: rgba(212,168,67,0.07);
}

/* ── COLORS per level ── */
.col-0 { background: linear-gradient(135deg,#1a3358,#0f2040); border: 1px solid rgba(212,168,67,0.3); }
.col-1 { background: linear-gradient(135deg,#0f3030,#0a2020); border: 1px solid rgba(45,212,191,0.3); }
.col-2 { background: linear-gradient(135deg,#2a1800,#1a1000); border: 1px solid rgba(251,146,60,0.3); }
.col-3 { background: linear-gradient(135deg,#1c0a30,#120720); border: 1px solid rgba(167,139,250,0.3); }
.col-4 { background: linear-gradient(135deg,#0a1c30,#060f1e); border: 1px solid rgba(96,165,250,0.3); }
.col-focus { background: linear-gradient(135deg,#2a0a0a,#1a0505); border: 1px solid rgba(224,64,64,0.4); }

/* ── BACK BUTTON ── */
#btn-back {
  display: none;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  padding: 2px 0;
}
#btn-back.visible { display: flex; }
#btn-back:active { color: var(--gold); }

/* ── EMPTY STATE ── */
.leaf-note {
  text-align: center;
  padding: 20px;
  color: var(--muted);
  font-size: 0.8rem;
  font-style: italic;
}

// ── STATE ─────────────────────────────────────────────────
let stack = []; // history of parent nodes
let current = DATA;
let nodeMap = {};

function indexNodes(node) {
  nodeMap[node.id] = node;
  (node.children||[]).forEach(indexNodes);
}
indexNodes(DATA);

// ── COLOR helpers ─────────────────────────────────────────
function nodeColor(node) {
  if (node.isFocus) return '#e04040';
  const palette = ['#d4a843','#2dd4bf','#fb923c','#a78bfa','#60a5fa'];
  return palette[Math.min(node.level, palette.length-1)];
}

function focusClass(node) {
  if (node.isFocus) return 'col-focus';
  return 'col-' + Math.min(node.level, 4);
}

// ── RENDER ────────────────────────────────────────────────
function render(node, direction) {
  current = node;
  const view = document.getElementById('view');
  const col = nodeColor(node);

  let html = '';

  // Focus card
  html += `<div class="focus-card ${focusClass(node)}">`;
  html += `<span class="focus-tag" style="color:${col}">${node.tag||''}</span>`;
  html += `<div class="focus-title" style="color:${col}">${node.label}</div>`;
  if (node.sub) html += `<div class="focus-sub">${node.sub}</div>`;

  if (node.stats && node.stats.length) {
    html += '<div class="stats-row">';
    node.stats.forEach(s => {
      html += `<div class="stat"><div class="stat-n" style="color:${col}">${s.n}</div><div class="stat-l">${s.l}</div></div>`;
    });
    html += '</div>';
  }

  if (node.rows && node.rows.length) {
    html += '<div class="details">';
    node.rows.forEach(r => {
      html += `<div class="detail-row">
        <span class="d-icon">${r.i}</span>
        <div class="d-body">
          <div class="d-label">${r.k}</div>
          <div class="d-val">${r.v}</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';

  // Children
  const kids = node.children || [];
  if (kids.length) {
    html += `<div class="section-label">Inside this level (${kids.length})</div>`;
    html += '<div class="children-list">';
    kids.forEach(kid => {
      const kc = nodeColor(kid);
      const hasKids = kid.children && kid.children.length > 0;
      html += `<div class="child-card ${kid.isFocus ? 'is-focus':''} ${hasKids ? 'has-children':''}" data-id="${kid.id}">
        <div class="child-dot" style="background:${kc}"></div>
        <div class="child-inner">
          <div class="child-name">${kid.label}</div>
          <div class="child-meta">${kid.tag || ''}${kid.sub ? ' · '+kid.sub : ''}</div>
        </div>
        <div class="child-arrow">${hasKids ? '›' : '·'}</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += '<div class="leaf-note">This is a leaf node — no sub-items.</div>';
  }

  view.innerHTML = html;
  view.className = direction === 'back' ? 'slide-back' : 'slide-enter';

  // Attach child clicks
  view.querySelectorAll('.child-card').forEach(el => {
    el.addEventListener('click', () => {
      const kid = nodeMap[el.dataset.id];
      if (!kid) return;
      if (kid.children && kid.children.length > 0) {
        // Drill down
        stack.push(current);
        render(kid, 'forward');
        updateNav();
        document.getElementById('scroll').scrollTop = 0;
      } else {
        // Show detail inline — jump to it as focus
        stack.push(current);
        render(kid, 'forward');
        updateNav();
        document.getElementById('scroll').scrollTop = 0;
      }
    });
  });

  updateNav();
}

function updateNav() {
  // Back button
  const btn = document.getElementById('btn-back');
  if (stack.length > 0) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }

  // Breadcrumb
  const bc = document.getElementById('breadcrumb');
  let html = '';
  stack.forEach((n, i) => {
    html += `<span class="bc" data-idx="${i}">${n.short || n.label}</span>`;
    html += '<span class="bc-sep">›</span>';
  });
  html += `<span class="bc current">${current.short || current.label}</span>`;
  bc.innerHTML = html;

  bc.querySelectorAll('.bc[data-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const target = stack[idx];
      stack = stack.slice(0, idx);
      render(target, 'back');
      document.getElementById('scroll').scrollTop = 0;
    });
  });
}

// Back button
document.getElementById('btn-back').addEventListener('click', () => {
  if (!stack.length) return;
  const prev = stack.pop();
  render(prev, 'back');
  document.getElementById('scroll').scrollTop = 0;
});

// ── INIT ──────────────────────────────────────────────────
render(DATA, 'forward');
</script>
</body>
</html>
